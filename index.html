<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobi Mobile - Abrir App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1A1A1A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #FFD600;
        }

        .logo-sub {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #E6C200;
            margin-top: 0.25rem;
        }

        /* Spinner amarillo */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 214, 0, 0.2);
            border-top-color: #FFD600;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1.5rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            font-size: 1rem;
            color: #999;
            line-height: 1.5;
        }

        /* Estado: abriendo app */
        .opening .status { color: #999; }

        /* Estado: app no encontrada */
        .fallback .spinner { display: none; }
        .fallback .status { color: #FFD600; font-size: 1.1rem; }

        /* Estado: error de token */
        .error .spinner { display: none; }
        .error .status { color: #F44336; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="logo">
            <div class="logo-text">mobi mobile</div>
            <div class="logo-sub">cliente</div>
        </div>
        <div class="spinner" id="spinner"></div>
        <div class="status" id="status">Abriendo la app...</div>
    </div>

    <script>
        (function() {
            var app = document.getElementById('app');
            var status = document.getElementById('status');

            // Leer token del query param ?t=TOKEN
            var params = new URLSearchParams(window.location.search);
            var token = params.get('t');

            // Validar formato: 64 caracteres hexadecimales
            if (!token || !/^[a-f0-9]{64}$/.test(token)) {
                app.className = 'container error';
                status.textContent = 'El enlace no es v\u00e1lido.';
                return;
            }

            // Intentar abrir deep link
            var deepLink = 'mobimobile://auth/' + token;
            window.location.href = deepLink;

            // Timeout: si seguimos en la pagina, la app no esta instalada
            setTimeout(function() {
                app.className = 'container fallback';
                status.textContent = 'Instala la app Mobi Mobile para continuar.';
            }, 2500);
        })();
    </script>
</body>
</html>
